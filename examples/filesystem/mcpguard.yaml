version: 1

defaults:
  action: ask
  reason: Review filesystem access before allowing it.

redaction:
  enabled: true
  mask: "****"

audit:
  enabled: true
  path: ".mcpguard/audit.jsonl"

approval:
  nonInteractive: deny
  rememberByDefault: false

rules:
  - id: block-secrets
    match:
      method: tools/call
      args:
        path:
          deny:
            - ".env"
            - ".env.*"
            - "**/.env"
            - "**/.env.*"
            - "**/*.pem"
            - "**/*.key"
            - "**/id_rsa"
            - "**/id_ed25519"
    action: deny

  - id: allow-docs-and-source
    match:
      method: tools/call
      tool:
        - read_file
        - list_directory
      args:
        path:
          allow:
            - "src/**"
            - "packages/**"
            - "docs/**"
            - "README.md"
            - "package.json"
    action: allow
